name: Daily AI Digest

on:
  schedule:
    # 05:00 UTC ≈ 08:00 Europe/Vilnius (DST may shift by 1h — fine for MVP)
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: digest-pipeline
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run pipeline
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL_FAST: openai/gpt-oss-120b
          GROQ_MODEL_DEEP: openai/gpt-oss-120b
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_ID: ${{ secrets.TELEGRAM_OWNER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENV: production
          LOG_LEVEL: INFO
          TZ: Europe/Vilnius
        run: |
          python -m scripts.run_pipeline_once
